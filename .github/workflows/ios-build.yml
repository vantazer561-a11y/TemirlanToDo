name: iOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      build_signed_ipa:
        description: Build signed IPA using Apple Developer secrets
        required: true
        default: false
        type: boolean
      export_method:
        description: Export method for signed IPA
        required: true
        default: ad-hoc
        type: choice
        options:
          - development
          - ad-hoc
          - app-store

jobs:
  build:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode versions
        run: |
          ls /Applications | grep Xcode || true
          xcodebuild -version

      - name: Build for simulator
        run: |
          xcodebuild \
            -project TemirlanToDo.xcodeproj \
            -scheme TemirlanToDo \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Run tests
        run: |
          xcodebuild \
            -project TemirlanToDo.xcodeproj \
            -scheme TemirlanToDo \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            test

  unsigned-ipa:
    name: Unsigned IPA for Sideloadly
    runs-on: macos-15
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned device app
        run: |
          xcodebuild \
            -project TemirlanToDo.xcodeproj \
            -scheme TemirlanToDo \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          ROOT="$PWD"
          APP_PATH="$(find "$PWD/build/DerivedData/Build/Products/Release-iphoneos" -name 'TemirlanToDo.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "TemirlanToDo.app was not found"
            exit 1
          fi

          mkdir -p "$ROOT/build/unsigned-ipa/Payload"
          cp -R "$APP_PATH" "$ROOT/build/unsigned-ipa/Payload/"
          cd "$ROOT/build/unsigned-ipa"
          /usr/bin/zip -qry "$ROOT/build/TemirlanToDo-unsigned.ipa" Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TemirlanToDo-unsigned-ipa
          path: build/TemirlanToDo-unsigned.ipa

  signed-ipa:
    name: Signed IPA
    runs-on: macos-15
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_signed_ipa }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/apple_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/TemirlanToDo.mobileprovision"

      - name: Create export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          EXPORT_METHOD: ${{ inputs.export_method }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          xcodebuild \
            -project TemirlanToDo.xcodeproj \
            -scheme TemirlanToDo \
            -configuration Release \
            -archivePath "$PWD/build/TemirlanToDo.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$PWD/build/TemirlanToDo.xcarchive" \
            -exportPath "$PWD/build/ipa" \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TemirlanToDo-ipa
          path: build/ipa/*.ipa
